<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora de Fichas - C.E. Malba Tahan</title>
    <style>
        :root {
            --bg-color: #fcf8f2;
            --primary-color: #e65c00;
            --primary-light: #ff8e42;
            --secondary-color: #ffb300;
            --dark-color: #4a2306;
            --border-color: #e0d3c1;
            --card-bg: #ffffff;
            --category-bg: #f5ede2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--dark-color);
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(74, 35, 6, 0.08);
            border: 2px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        /* Bandeirinhas decorativas Juninas em puro CSS */
        .flags-container {
            display: flex;
            justify-content: space-around;
            margin: -20px -20px 16px -20px;
            padding-top: 6px;
            background: #fff8f0;
            border-bottom: 2px dashed var(--border-color);
        }

        .flag {
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 20px solid var(--primary-color);
        }
        .flag:nth-child(even) { border-top-color: var(--secondary-color); }
        .flag:nth-child(3n) { border-top-color: #4caf50; }
        .flag:nth-child(4n) { border-top-color: #2196f3; }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 24px;
            color: var(--primary-color);
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        header p {
            font-size: 14px;
            color: #7c624d;
            margin-top: 2px;
        }

        .category-title {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            background: var(--category-bg);
            padding: 6px 12px;
            border-radius: 8px;
            margin: 15px 0 8px 0;
            color: var(--dark-color);
            letter-spacing: 0.5px;
        }
        .category-title:first-of-type {
            margin-top: 0;
        }

        .items-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .item-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #faf6f0;
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .item-info {
            flex: 1;
            padding-right: 8px;
        }

        .item-name {
            font-weight: 700;
            font-size: 15px;
            color: var(--dark-color);
            line-height: 1.2;
        }

        .item-price {
            font-size: 13px;
            color: var(--primary-color);
            font-weight: 600;
            margin-top: 2px;
        }

        .counter-control {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-count {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            border: none;
            background: var(--primary-color);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 6px rgba(230, 92, 0, 0.2);
            touch-action: manipulation;
        }

        .btn-count:active {
            transform: scale(0.95);
            background: var(--primary-light);
        }

        .count-value {
            font-size: 18px;
            font-weight: 700;
            min-width: 24px;
            text-align: center;
        }

        .summary-box {
            background: var(--dark-color);
            color: white;
            padding: 18px;
            border-radius: 18px;
            margin-bottom: 20px;
            box-shadow: 0 6px 16px rgba(74, 35, 6, 0.15);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary-label {
            font-size: 16px;
            opacity: 0.9;
        }

        .summary-total {
            font-size: 28px;
            font-weight: 800;
            color: var(--secondary-color);
        }

        .change-section {
            background: #f9f9f9;
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 16px;
        }

        .change-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--dark-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-group {
            position: relative;
            margin-bottom: 12px;
        }

        .input-group span {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 600;
            color: #7c624d;
        }

        .input-money {
            width: 100%;
            padding: 12px 12px 12px 42px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--dark-color);
            background: white;
            outline: none;
            transition: border-color 0.2s;
            -moz-appearance: textfield;
        }

        .input-money::-webkit-outer-spin-button,
        .input-money::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .input-money:focus {
            border-color: var(--primary-color);
        }

        .change-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px dashed var(--border-color);
        }

        .change-label {
            font-weight: 600;
            font-size: 15px;
        }

        .change-value {
            font-size: 20px;
            font-weight: 700;
            color: #4caf50;
        }
        
        .change-value.negative {
            color: #f44336;
        }

        .btn-clear {
            width: 100%;
            padding: 14px;
            background: #f0e6da;
            border: none;
            border-radius: 14px;
            color: var(--dark-color);
            font-size: 15px;
            font-weight: 700;
            margin-top: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .btn-clear:active {
            background: #e2d3c1;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="flags-container">
            <div class="flag"></div><div class="flag"></div><div class="flag"></div>
            <div class="flag"></div><div class="flag"></div><div class="flag"></div>
            <div class="flag"></div><div class="flag"></div><div class="flag"></div>
        </div>

        <header>
            <h1>C.E. Malba Tahan</h1>
            <p>Caixa de Fichas - Festa Junina</p>
        </header>

        <div class="items-list" id="items-list">
            </div>

        <div class="summary-box">
            <div class="summary-row">
                <span class="summary-label">TOTAL A PAGAR</span>
                <span class="summary-total" id="total-display">R$ 0,00</span>
            </div>
        </div>

        <div class="change-section">
            <div class="change-title">💸 Calcular Troco</div>
            <div class="input-group">
                <span>R$</span>
                <input type="number" step="0.01" inputmode="decimal" placeholder="Valor pago pelo cliente" class="input-money" id="amount-paid" oninput="calculateChange()">
            </div>
            <div class="change-result">
                <span class="change-label" id="change-label">Troco:</span>
                <span class="change-value" id="change-display">R$ 0,00</span>
            </div>
        </div>

        <button class="btn-clear" onclick="clearAll()">Zerar Pedido</button>
    </div>

    <script>
        const menuData = [
            {
                category: "Salgados",
                items: [
                    { id: 'coxinha', name: 'Coxinha', price: 7.00 },
                    { id: 'enrolado_salsicha', name: 'Enrolado de Salsicha', price: 7.00 },
                    { id: 'risoles', name: 'Risoles', price: 7.00 },
                    { id: 'espetinho_carne', name: 'Espetinho de Carne', price: 8.00 },
                    { id: 'cachorro_quente', name: 'Cachorro-Quente', price: 12.00 },
                    { id: 'pastel', name: 'Pastel', price: 10.00 },
                    { id: 'pipoca_salgada', name: 'Pipoca Salgada', price: 2.00 } // Preço atualizado aqui!
                ]
            },
            {
                category: "Doces e Sobremesas",
                items: [
                    { id: 'pacoca', name: 'Paçoca', price: 5.00 },
                    { id: 'cocada', name: 'Cocada', price: 5.00 },
                    { id: 'pipoca_gourmet', name: 'Pipoca Gourmet', price: 3.00 },
                    { id: 'maca_amor', name: 'Maçã do Amor', price: 6.00 },
                    { id: 'espetinho_morango', name: 'Espetinho de Morango', price: 12.00 },
                    { id: 'bolo_fatia', name: 'Bolo com Cobertura (Fatia)', price: 4.00 },
                    { id: 'bolo_casquinha', name: 'Bolo Recheado na Casquinha', price: 4.00 },
                    { id: 'cone_trufado', name: 'Cone Trufado', price: 8.00 },
                    { id: 'pudim_fatia', name: 'Pudim (Fatia)', price: 4.00 },
                    { id: 'churros', name: 'Churros', price: 8.00 }
                ]
            },
            {
                category: "Bebidas",
                items: [
                    { id: 'agua', name: 'Água', price: 3.00 },
                    { id: 'coca_lata', name: 'Coca Lata', price: 6.00 },
                    { id: 'guarana_lata', name: 'Guaraná Lata', price: 6.00 },
                    { id: 'skol_lata', name: 'Skol Lata 269ml', price: 6.00 },
                    { id: 'brahma_lata', name: 'Brahma Lata 269ml', price: 6.00 },
                    { id: 'quentao', name: 'Quentão', price: 5.00 }
                ]
            },
            {
                category: "Diversão / Brincadeiras",
                items: [
                    { id: 'pescaria', name: 'Pescaria', price: 5.00 },
                    { id: 'brinquedos', name: 'Brinquedos', price: 8.00 }
                ]
            }
        ];

        const cart = {};
        const productMap = {};

        menuData.forEach(cat => {
            cat.items.forEach(item => {
                cart[item.id] = 0;
                productMap[item.id] = item;
            });
        });

        let totalOrder = 0;

        function renderMenu() {
            const container = document.getElementById('items-list');
            container.innerHTML = '';

            menuData.forEach(cat => {
                const title = document.createElement('div');
                title.className = 'category-title';
                title.innerText = cat.category;
                container.appendChild(title);

                cat.items.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerHTML = `
                        <div class="item-info">
                            <div class="item-name">${product.name}</div>
                            <div class="item-price">R$ ${product.price.toFixed(2).replace('.', ',')}</div>
                        </div>
                        <div class="counter-control">
                            <button class="btn-count" onclick="updateQuantity('${product.id}', -1)">-</button>
                            <span class="count-value" id="count-${product.id}">0</span>
                            <button class="btn-count" onclick="updateQuantity('${product.id}', 1)">+</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        function updateQuantity(productId, change) {
            const currentQty = cart[productId];
            const newQty = currentQty + change;

            if (newQty >= 0) {
                cart[productId] = newQty;
                document.getElementById(`count-${productId}`).innerText = newQty;
                calculateTotal();
            }
        }

        function calculateTotal() {
            totalOrder = Object.keys(cart).reduce((sum, id) => {
                return sum + (cart[id] * productMap[id].price);
            }, 0);

            document.getElementById('total-display').innerText = `R$ ${totalOrder.toFixed(2).replace('.', ',')}`;
            calculateChange();
        }

        function calculateChange() {
            const paidInput = document.getElementById('amount-paid');
            const changeDisplay = document.getElementById('change-display');
            const changeLabel = document.getElementById('change-label');
            
            const amountPaid = parseFloat(paidInput.value) || 0;

            if (amountPaid === 0) {
                changeDisplay.innerText = "R$ 0,00";
                changeDisplay.className = "change-value";
                changeLabel.innerText = "Troco:";
                return;
            }

            const change = amountPaid - totalOrder;

            if (change < 0) {
                changeLabel.innerText = "Falta pagar:";
                changeDisplay.innerText = `R$ ${Math.abs(change).toFixed(2).replace('.', ',')}`;
                changeDisplay.className = "change-value negative";
            } else {
                changeLabel.innerText = "Troco:";
                changeDisplay.innerText = `R$ ${change.toFixed(2).replace('.', ',')}`;
                changeDisplay.className = "change-value";
            }
        }

        function clearAll() {
            Object.keys(cart).forEach(id => {
                cart[id] = 0;
                document.getElementById(`count-${id}`).innerText = 0;
            });
            document.getElementById('amount-paid').value = '';
            calculateTotal();
        }

        window.onload = renderMenu;
    </script>
</body>
</html>
